global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: backbone-app
    metrics_path: /metrics
    static_configs:
      - targets: ["backbone-app:9090"]
        labels:
          service: backbone-app
          tier: app

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          tier: infra

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          tier: host

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          tier: db
