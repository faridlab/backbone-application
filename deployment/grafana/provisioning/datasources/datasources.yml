apiVersion: 1

# UIDs are pinned explicitly so alert rules and dashboards can reference
# them across restarts. Auto-generated UIDs would change whenever Grafana
# regenerates the datasource and break alert rule linkage.
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
