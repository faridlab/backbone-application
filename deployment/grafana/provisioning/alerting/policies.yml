# Default notification routing.
#
# Everything goes to `email-ops`. Critical alerts (severity=critical)
# repeat every hour; warnings every four hours — matching typical beta
# oncall cadence. Tighten when traffic actually exists.

apiVersion: 1

policies:
  - orgId: 1
    receiver: email-ops
    group_by: [alertname, severity]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: email-ops
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
