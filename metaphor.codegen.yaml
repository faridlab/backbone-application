# Metaphor codegen manifest
#
# Declares files the generator must NEVER touch. Anything matched by a glob
# below is skipped wholesale on `metaphor schema generate` — no merge, no
# overwrite, no deletion. This is the contract that lets application code
# own files inside the generator's output tree without losing them every regen.
#
# Glob syntax follows the `globset` crate (similar to .gitignore):
#   *        — any chars except `/`
#   **       — recursive across path separators
#   ?        — single char
#   [abc]    — character class
#
# Tip: paths are relative to the project root (where this file lives).
#
# This skeleton ships a minimal manifest. Add an entry for every hand-written
# file you introduce inside a generator-owned tree, otherwise the next
# `metaphor schema generate --force` will silently delete it.
#
# Placeholder convention:
#   {{service_name}} — the project's package/binary name (e.g. backbone-app)
#   {{ServiceName}}  — the PascalCase form (e.g. BackboneApp)
#   {{module_name}}  — a domain module composed into this service
#   {{entity}}       — a specific entity (account, invoice, …)
#   {{custom}}       — a hand-written application service with no schema model

user_owned:
  # ── Composition / bootstrap ─────────────────────────────────────────
  # Hand-written wiring that turns the library surface into a runnable
  # binary. Schema generation MUST leave these alone.
  - "src/main.rs"
  - "src/bootstrap/**"
  - "src/configuration/**"
  - "src/shared/**"
  - "src/middleware/**"

  # Example: a domain module's composition entrypoint.
  # - "src/{{module_name}}_module.rs"
  # - "src/{{module_name}}_core.rs"

  # ── Hand-written application services ───────────────────────────────
  # Generated CRUD services (one per schema entity) are NOT listed here —
  # they live in src/application/service/ and are regenerated each time.
  # Anything hand-written inside that folder MUST be pinned below.
  #
  # Example:
  # - "src/application/service/{{custom}}_service.rs"

  # ── Custom infrastructure adapters ──────────────────────────────────
  # Anything inside src/infrastructure/integration/ that isn't derived
  # from schema (HTTP clients, message-bus adapters, custom transformers).
  #
  # Example:
  # - "src/infrastructure/integration/**"

  # ── Custom presentation layers (transport plumbing) ─────────────────
  # gRPC servers, GraphQL composition, CLI commands, API versioning —
  # the schema models REST CRUD, not these transports.
  #
  # Example:
  # - "src/presentation/grpc/**"
  # - "src/presentation/graphql/**"
  # - "src/presentation/middleware/**"
  # - "src/presentation/versioning/**"
  # - "src/presentation/cli/**"

  # ── Custom HTTP handlers + middleware composition ───────────────────
  # Cross-entity orchestrators that don't fit a single handler. Use
  # sparingly; most endpoints should still be BackboneCrudHandler-backed.
  #
  # Example:
  # - "src/handlers/**"

  # ── Domain extensions ───────────────────────────────────────────────
  # State machines, permission policies, computed fields — anything that
  # extends a generated entity but can't live behind `// <<< CUSTOM` markers.
  #
  # Example:
  # - "src/custom/**"

  # ── Public exports surface ──────────────────────────────────────────
  # Re-exports consumed by downstream binaries. Stable API; breaking
  # changes here ripple through every consumer.
  #
  # Example:
  # - "src/exports/**"

  # ── Subscription-specific runtime helpers ───────────────────────────
  # Event subscribers / async listeners that delegate to application
  # services. Keep them thin — see docs/architecture/ddd.md.
  #
  # Example:
  # - "src/subscriptions/**"

  # ── Hand-written seeders ────────────────────────────────────────────
  # Generated seeders live alongside generated entities; hand-written
  # ones (fixture data, dev-only test users) belong under custom/.
  #
  # Example:
  # - "src/seeders/custom/**"

  # ── Hand-written migrations ─────────────────────────────────────────
  # Data backfills, audit triggers, ad-hoc fixes. Generated migrations
  # carry a `-- Generated by metaphor-schema` header and are managed
  # automatically — files without that marker are preserved even
  # without an explicit entry here.
  - "migrations/manual/**"

  # ── Stale-marker migrations ─────────────────────────────────────────
  # Migrations that started life as generator output but were taken over
  # by hand (still carry the generator marker, so they'd otherwise be
  # swept on --force). Pin each one explicitly until it moves to
  # migrations/manual/.
  #
  # Example:
  # - "migrations/{{YYYYMMDDHHMMSS}}_some_hand_edited_migration.up.sql"
