# Release the backbone-app Docker image to GHCR on tag push.
#
# Usage:
#   git tag v0.5.2
#   git push --tags
# â†’ builds the image with version metadata baked in (via build.rs reading
#   APP_VERSION / GIT_SHA / BUILT_AT), pushes to GHCR with two tags:
#     ghcr.io/<owner>/backbone-app:v0.5.2     (matches git tag)
#     ghcr.io/<owner>/backbone-app:<git-sha>  (immutable pin)
#
# Pairs with release.yml in this folder, which creates the GitHub Release
# itself from the same tag push.
#
# Deploys are still manual: after the workflow goes green, run
#   ./scripts/deploy-service.sh backbone-app v0.5.2 SERVICE_TAG
# (or set SERVICE_TAG=v0.5.2 in deployment/.env.prod and
# `docker compose pull && up -d` on the VPS).
# CI does NOT auto-deploy on purpose â€” keep a human-in-the-loop.
#
# No moving tags (`:latest`, `:beta`) by design â€” production should pin to
# a specific version. If you need a moving pointer for an internal demo
# environment, push it manually:
#   docker tag ghcr.io/<owner>/backbone-app:v0.5.2 ghcr.io/<owner>/backbone-app:demo
#   docker push ghcr.io/<owner>/backbone-app:demo

name: release-image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write    # for pushing to GHCR

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the auto-generated release notes can diff
          # against the previous tag.
          fetch-depth: 0

      - name: Derive version metadata
        id: meta
        run: |
          # Strip leading `v` for APP_VERSION (what gets baked into the
          # binary and shown in /health). Keep the full tag for the image
          # tag so it matches the git ref exactly.
          tag="${GITHUB_REF_NAME}"            # v0.5.2
          version="${tag#v}"                  # 0.5.2
          sha="$(git rev-parse --short HEAD)" # 4d6274a
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "tag=$tag"           >> "$GITHUB_OUTPUT"
          echo "version=$version"   >> "$GITHUB_OUTPUT"
          echo "sha=$sha"           >> "$GITHUB_OUTPUT"
          echo "built_at=$built_at" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag (version=$version sha=$sha built_at=$built_at)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/backbone-app:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/backbone-app:${{ steps.meta.outputs.sha }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ steps.meta.outputs.sha }}
            BUILT_AT=${{ steps.meta.outputs.built_at }}
          # GitHub Actions cache for buildx â€” speeds up rebuilds when
          # only some layers changed (e.g. src/ edit, deps unchanged).
          cache-from: type=gha
          cache-to: type=gha,mode=max
