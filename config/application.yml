# Backbone Framework Application Configuration (skeleton defaults)
#
# Override any value via environment variable using the `${VAR:default}` syntax.
# Per-environment overrides go in `config/application-{APP_ENV}.yml` (e.g.
# config/application-dev.yml). The skeleton ships with a `dev` overlay.

server:
  host: "${HOST:0.0.0.0}"
  port: 8080

database:
  url: "${DATABASE_URL:postgresql://postgres:password@localhost:5432/backbone_app}"
  max_connections: 20
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
  max_lifetime: 1800

logging:
  level: "${LOG_LEVEL:info}"
  format: "${LOG_FORMAT:json}"

security:
  jwt_secret: "${JWT_SECRET:change-me-in-production}"
  jwt_algorithm: "HS256"
  jwt_issuer: "backbone-framework"
  jwt_audience: "backbone-users"
  jwt_expiration: 86400
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
