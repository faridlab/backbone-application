# =============================================================================
# Domain: Platform
# Entity: Sysparam
# Description: System-wide configurable parameters grouped by domain
# =============================================================================

models:
  - name: Sysparam
    collection: sysparams
    description: "System-wide configurable parameters grouped by domain (addresses, tunables, lookups)"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique sysparam identifier"

      group_name:
        type: string
        attributes: ["@required", "@length(64)"]
        description: "Logical grouping (e.g. 'Address', 'FeatureFlag', 'Tunable')"

      key:
        type: string
        attributes: ["@required", "@length(128)"]
        description: "Identifier within the group (e.g. 'Jakarta')"

      value:
        type: string
        attributes: ["@required"]
        description: "Primary value as text"

      data:
        type: json
        description: "Optional structured payload (e.g. {maps, district_code, origin})"

      sort_order:
        type: int
        attributes: ["@default(0)"]
        description: "Display order within group"

      status:
        type: SysparamStatus
        attributes: ["@required", "@default(active)"]
        description: "Record status (active | inactive)"

      description:
        type: string?
        description: "Human-readable note for operators"

      metadata:
        # `json`, not the structured `Metadata` shared type: this skeleton has no index.model.yaml
        # defining shared types, so `type: Metadata` was undefined and failed validation. A standalone
        # example model uses the inline json form; a real module gets `Metadata` from its index.
        type: json
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    indexes:
      - type: unique
        fields: [group_name, key]
      - fields: [group_name]
      - fields: [status]

enums:
  - name: SysparamStatus
    description: "Sysparam record status"
    variants:
      - name: active
        description: "In use"
        default: true
      - name: inactive
        description: "Disabled but retained"
